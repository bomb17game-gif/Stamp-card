<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ラジオ体操スタンプカード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sky:    #4A9ECA;
    --sun:    #F5A623;
    --stamp:  #E8501A;
    --bg:     #F0F7FF;
    --surface:#FFFFFF;
    --text:   #1A2E3A;
    --muted:  #7A96A8;
    --border: #D6E8F4;
    --radius: 10px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ═══ 名前入力 ═══ */
  #registerScreen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.5rem; }
  #registerScreen.active { display: flex; }
  .reg-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem 2rem; max-width: 360px; width: 100%; text-align: center; }
  .reg-sun { font-size: 48px; margin-bottom: 1rem; animation: rise 0.8s ease-out both; }
  @keyframes rise { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .reg-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .reg-sub { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 1.75rem; }
  .reg-label { display: block; font-size: 12px; font-weight: 600; color: var(--sky); letter-spacing: 0.06em; text-align: left; margin-bottom: 6px; }
  .reg-input { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; font-size: 16px; font-family: inherit; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.15s; margin-bottom: 1.25rem; }
  .reg-input:focus { border-color: var(--sky); }
  .reg-input::placeholder { color: var(--muted); }
  .reg-btn { width: 100%; background: var(--sky); color: #fff; border: none; border-radius: var(--radius); padding: 13px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background 0.15s, transform 0.1s; }
  .reg-btn:hover { background: #3A8DBE; }
  .reg-btn:active { transform: scale(0.98); }
  .reg-btn:disabled { background: var(--border); color: var(--muted); cursor: default; }
  .reg-note { font-size: 11px; color: var(--muted); margin-top: 1rem; line-height: 1.6; }

  /* ═══ カード画面 ═══ */
  #cardScreen { display: none; padding-bottom: 3rem; }
  #cardScreen.active { display: block; }

  .hero { background: linear-gradient(160deg, #1B6FA8 0%, #4A9ECA 60%, #6BBFE0 100%); padding: 1.5rem 1.5rem 2.75rem; text-align: center; position: relative; overflow: hidden; }
  .hero::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 28px; background: var(--bg); border-radius: 50% 50% 0 0 / 100% 100% 0 0; }
  .hero-sun { font-size: 32px; margin-bottom: 6px; animation: rise 0.8s ease-out both; }
  .hero-title { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 4px; }
  .hero-name { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 2px; text-shadow: 0 1px 6px rgba(0,0,0,0.2); }
  .hero-name span { font-size: 14px; font-weight: 400; opacity: 0.8; margin-left: 2px; }
  .hero-sub { font-size: 12px; color: rgba(255,255,255,0.7); letter-spacing: 0.04em; }

  .main { max-width: 540px; margin: 0 auto; padding: 1.25rem 1rem 0; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 8px; text-align: center; }
  .stat-num { font-size: 24px; font-weight: 700; color: var(--sky); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .progress-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 1.25rem; }
  .progress-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .progress-pct { font-size: 18px; font-weight: 700; color: var(--stamp); }
  .progress-frac { font-size: 12px; color: var(--muted); }
  .bar-bg { background: var(--border); border-radius: 100px; height: 10px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--stamp) 0%, var(--sun) 100%); border-radius: 100px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }

  /* Collectボタン */
  .collect-wrap { margin-bottom: 1.25rem; }
  .collect-btn { width: 100%; padding: 17px; border-radius: var(--radius); border: none; font-family: inherit; font-size: 16px; font-weight: 700; letter-spacing: 0.04em; cursor: pointer; transition: background 0.15s, transform 0.1s, box-shadow 0.15s; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .collect-btn.ready { background: var(--stamp); color: #fff; box-shadow: 0 4px 18px rgba(232,80,26,0.38); }
  .collect-btn.ready:hover { background: #D04416; }
  .collect-btn.ready:active { transform: scale(0.98); }
  .collect-btn.done { background: #E8F5EE; color: #2A8050; border: 1.5px solid #A0D5B5; cursor: default; }
  .collect-sub { font-size: 11px; color: var(--muted); text-align: center; margin-top: 6px; }

  /* ═══ 救済ボタン ═══ */
  .rescue-toggle {
    width: 100%; padding: 12px; border-radius: var(--radius); border: 1.5px dashed var(--border);
    background: transparent; font-family: inherit; font-size: 13px; font-weight: 600;
    color: var(--muted); cursor: pointer; margin-bottom: 1.25rem;
    transition: border-color 0.15s, color 0.15s;
  }
  .rescue-toggle:hover { border-color: var(--sky); color: var(--sky); }

  /* 救済モーダル */
  .modal-overlay { position: fixed; inset: 0; background: rgba(26,46,58,0.5); display: flex; align-items: center; justify-content: center; z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .modal-overlay.show { opacity: 1; pointer-events: auto; }
  .modal-box { background: var(--surface); border-radius: 20px; padding: 2rem 1.75rem; max-width: 340px; width: 90%; transform: scale(0.88) translateY(16px); transition: transform 0.32s cubic-bezier(.34,1.56,.64,1); }
  .modal-overlay.show .modal-box { transform: scale(1) translateY(0); }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
  .modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 1.25rem; line-height: 1.6; }
  .modal-label { display: block; font-size: 11px; font-weight: 600; color: var(--sky); letter-spacing: 0.06em; margin-bottom: 5px; }
  .modal-input { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 11px 13px; font-size: 15px; font-family: inherit; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.15s; margin-bottom: 1rem; }
  .modal-input:focus { border-color: var(--sky); }
  .modal-input::placeholder { color: var(--muted); }
  .date-radio-group { display: flex; flex-direction: column; gap: 7px; margin-bottom: 1.25rem; }
  .date-radio-label { display: flex; align-items: center; gap: 10px; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer; font-size: 13px; transition: border-color 0.15s, background 0.15s; }
  .date-radio-label:hover { border-color: var(--sky); background: #F5FAFF; }
  .date-radio-label input[type=radio] { accent-color: var(--sky); width: 16px; height: 16px; flex-shrink: 0; }
  .date-radio-label.selected { border-color: var(--sky); background: #EDF6FF; }
  .date-radio-main { font-weight: 600; color: var(--text); }
  .date-radio-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .modal-btn-row { display: flex; gap: 8px; }
  .modal-btn { flex: 1; padding: 12px; border-radius: var(--radius); border: none; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s, transform 0.1s; }
  .modal-btn.cancel { background: var(--bg); color: var(--muted); border: 1.5px solid var(--border); }
  .modal-btn.cancel:hover { border-color: var(--muted); }
  .modal-btn.apply { background: var(--sky); color: #fff; }
  .modal-btn.apply:hover { background: #3A8DBE; }
  .modal-btn.apply:active { transform: scale(0.97); }
  .modal-btn.apply:disabled { background: var(--border); color: var(--muted); cursor: default; }
  .modal-error { font-size: 12px; color: var(--stamp); margin-top: -8px; margin-bottom: 10px; min-height: 16px; }

  /* ═══ スタンプカード ═══ */
  .card-frame { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 1.25rem; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .card-title { font-size: 13px; font-weight: 700; color: var(--sky); letter-spacing: 0.06em; }
  .card-count { font-size: 11px; color: var(--muted); }
  .stamp-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  .cell { border-radius: 8px; border: 1.5px solid var(--border); background: var(--surface); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; aspect-ratio: 1 / 1.28; padding-bottom: 20px; }
  .cell.empty { background: #F8FBFF; }
  .cell.stamped { background: #FFF2EE; border-color: #FBCBBA; }
  .cell.rescue-stamped { background: #FFF8EE; border-color: #FBDAA8; }
  .cell-img { width: 68%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }
  .cell-img img { width: 100%; height: 100%; object-fit: contain; opacity: 0; }
  .cell.stamped .cell-img img, .cell.rescue-stamped .cell-img img { opacity: 1; }
  .cell.rescue-stamped .cell-img img { opacity: 0.65; filter: sepia(0.4) hue-rotate(20deg); }
  .cell-date { position: absolute; bottom: 3px; left: 0; right: 0; text-align: center; font-size: 9px; color: var(--muted); letter-spacing: 0.02em; line-height: 1.3; }
  .cell.empty .cell-date { opacity: 0; }
  .cell-num { position: absolute; top: 3px; left: 5px; font-size: 9px; color: var(--border); font-weight: 600; line-height: 1; }
  .cell.stamped .cell-num { color: #F5BDA8; }
  .cell.rescue-stamped .cell-num { color: #F5D0A8; }
  .cell.stamp-anim .cell-img img { animation: stamp-drop 0.45s cubic-bezier(.22,1.4,.36,1) both; }
  @keyframes stamp-drop { 0% { transform: scale(2.2) rotate(-10deg); opacity: 0; } 60% { transform: scale(0.88) rotate(2deg); opacity: 1; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }

  /* バナー */
  .banner { border-radius: var(--radius); padding: 12px 16px; font-size: 13px; margin-bottom: 1.25rem; display: none; align-items: center; gap: 10px; }
  .banner.show { display: flex; }
  .banner.info { background: #E8F5EE; border: 1px solid #A0D5B5; color: #1A6040; }

  /* お祝いポップアップ */
  .popup-overlay { position: fixed; inset: 0; background: rgba(26,46,58,0.5); display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .popup-overlay.show { opacity: 1; pointer-events: auto; }
  .popup-box { background: var(--surface); border-radius: 20px; padding: 2.5rem 2rem; max-width: 300px; width: 90%; text-align: center; transform: scale(0.85) translateY(20px); transition: transform 0.35s cubic-bezier(.34,1.56,.64,1); }
  .popup-overlay.show .popup-box { transform: scale(1) translateY(0); }
  .popup-logo { width: 72px; height: 72px; margin: 0 auto 0.75rem; animation: spin-in 0.5s cubic-bezier(.34,1.56,.64,1) both; }
  .popup-logo img { width: 100%; height: 100%; object-fit: contain; }
  @keyframes spin-in { from { transform: scale(0) rotate(-30deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
  .popup-msg { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 6px; line-height: 1.3; }
  .popup-date { font-size: 12px; color: var(--muted); margin-bottom: 1.5rem; }
  .popup-close { background: var(--sky); color: #fff; border: none; border-radius: var(--radius); padding: 11px 32px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background 0.15s, transform 0.1s; }
  .popup-close:hover { background: #3A8DBE; }
  .popup-close:active { transform: scale(0.97); }

  footer { text-align: center; font-size: 11px; color: var(--muted); margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); line-height: 1.8; }
  .reset-link { font-size: 11px; color: var(--muted); text-decoration: underline; cursor: pointer; background: none; border: none; font-family: inherit; }
  .reset-link:hover { color: var(--stamp); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(72px); background: var(--text); color: #fff; border-radius: 100px; padding: 10px 22px; font-size: 13px; font-weight: 500; white-space: nowrap; transition: transform 0.3s cubic-bezier(.4,0,.2,1); z-index: 999; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- 名前入力 -->
<div id="registerScreen">
  <div class="reg-card">
    <div class="reg-sun">🌅</div>
    <div class="reg-title">ラジオ体操スタンプカード</div>
    <p class="reg-sub">毎日参加した日にスタンプを押しましょう！</p>
    <label class="reg-label" for="nameInput">あなたのお名前</label>
    <input id="nameInput" class="reg-input" type="text" placeholder="例：山田 太郎" maxlength="20" autocomplete="off" />
    <button id="startBtn" class="reg-btn" disabled>はじめる →</button>
    <p class="reg-note">入力した名前はこのデバイスに保存されます。</p>
  </div>
</div>

<!-- カード画面 -->
<div id="cardScreen">
  <div class="hero">
    <div class="hero-sun">🌅</div>
    <div class="hero-title">ラジオ体操スタンプカード</div>
    <div class="hero-name" id="heroName"></div>
    <div class="hero-sub" id="heroSub"></div>
  </div>

  <main class="main">
    <div class="banner info" id="completeBanner">
      <span>🎉</span><span>全マスコンプリート！おめでとうございます！</span>
    </div>

    <div class="stats">
      <div class="stat-card"><div class="stat-num" id="sCount">0</div><div class="stat-label">スタンプ数</div></div>
      <div class="stat-card"><div class="stat-num" id="sTotal">—</div><div class="stat-label">合計マス数</div></div>
      <div class="stat-card"><div class="stat-num" id="sRemain">—</div><div class="stat-label">残り</div></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-top">
        <span class="progress-pct" id="pPct">0%</span>
        <span class="progress-frac" id="pFrac">0 / —</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="pBar" style="width:0%"></div></div>
    </div>

    <div class="collect-wrap">
      <button class="collect-btn ready" id="collectBtn">✿ Collect today's stamp</button>
      <div class="collect-sub" id="collectSub"></div>
    </div>

    <!-- 救済ボタン -->
    <button class="rescue-toggle" id="rescueToggle">🆘 押し忘れた日のスタンプを申請する</button>

    <div id="cardArea"></div>

    <footer>
      同じデバイス・ブラウザで記録が保持されます<br>
      機種変更・ブラウザ変更時は記録が引き継がれません<br><br>
      <button class="reset-link" id="resetBtn">最初からやり直す（データを削除）</button>
    </footer>
  </main>
</div>

<!-- 救済モーダル -->
<div class="modal-overlay" id="rescueModal">
  <div class="modal-box">
    <div class="modal-title">🆘 押し忘れ救済</div>
    <p class="modal-sub">運営からもらった救済コードと、スタンプを押す日付を選んでください。</p>

    <label class="modal-label">救済コード</label>
    <input id="rescueCode" class="modal-input" type="text" placeholder="6桁のコードを入力" maxlength="6" autocomplete="off" />
    <div class="modal-error" id="rescueError"></div>

    <label class="modal-label">スタンプを押す日付</label>
    <div class="date-radio-group" id="dateRadioGroup"></div>

    <div class="modal-btn-row">
      <button class="modal-btn cancel" id="rescueCancel">キャンセル</button>
      <button class="modal-btn apply" id="rescueApply" disabled>スタンプを押す</button>
    </div>
  </div>
</div>

<!-- お祝いポップアップ -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup-box">
    <div class="popup-logo"><img id="popupStampImg" src="" alt="stamp"/></div>
    <div class="popup-msg" id="popupMsg">Keep it up!</div>
    <div class="popup-date" id="popupDate"></div>
    <button class="popup-close" id="popupClose">閉じる</button>
  </div>
</div>

<div class="toast" id="toast"></div>

DYnqDk5RL3xRqiPPgpUVkL64gsqbd8O7NsHuajIaveiEu7TB+H+/REeNAgukURiOULYPJKaCu2WW4h2yy3w+/0gPh/kw4epcuQI5IICKEVFIOfPW+Yezc4GzcmBlpuLQK9eCP/DP9QTsssqxwS1iMwzm9oRvx9SURGVT52CdOYMXBcvgly4AHL+PMiFC0B5ecR+rNDMTODaa0Hbtav+r0MH0OxsBDp3jijfy9t1EXYi88zWUK8Xap8+RL36pRlJwI2kinGybRAfgQgEDkQIWyBwIELYAoEDEZlnwk7YOdBORGyBwIEIYQsEDkQIWyBwIELYAoEDURoOynmcCBB2wk7YidU2BYKkRwhbIHAgQtgCgQMRwhYIHIjIPBN2ws6BdiJiCwQORAhbIHAgQtgCgQMRwhYIHIjIPBN2ws6BdiJiCwQO5P8B9SC4I9Cwq1oAAAAASUVORK5CYII=';
  const SECRET_KEY    = 'RAJIO2026';   // 運営のみ知る秘密キー
  const CELLS_PER_PAGE = 30;
  const RESCUE_DAYS    = 7;            // 当日含めて遡れる日数

  const UID_KEY   = 'rajio_uid_v3';
  const NAME_KEY  = 'rajio_name_v3';
  function getUID() {
    let uid = localStorage.getItem(UID_KEY);
    if (!uid) { uid = 'u' + Math.random().toString(36).slice(2,10) + Date.now().toString(36); localStorage.setItem(UID_KEY, uid); }
    return uid;
  }
  const STAMP_KEY = 'rajio_stamps_v3_' + getUID();

  const MESSAGES = ['Keep it up!','Nice consistency!','Still going strong!','Another step!','One more done!','Progress made!','Impressive!','Small steps win.','You did it!','Consistency wins.','Built by consistency.','Strong move!','Nailed it!','Keep the streak!','Winning habit.','Consistency is key.','Consistency beats talent.','Progress over perfection.','Trust the process.'];

  /* ─── コード生成 ─── */
  // 日付文字列 "YYYYMMDD" × 秘密キー → 6桁数字コード
  function generateCode(dateStr) {
    // 簡易ハッシュ（djb2ベース）
    const s = dateStr + SECRET_KEY;
    let h = 5381;
    for (let i = 0; i < s.length; i++) {
      h = ((h << 5) + h) ^ s.charCodeAt(i);
      h = h >>> 0;
    }
    return String(h % 1000000).padStart(6, '0');
  }

  /* ─── 画面切替 ─── */
  function showRegister() { document.getElementById('registerScreen').classList.add('active'); document.getElementById('cardScreen').classList.remove('active'); setTimeout(() => document.getElementById('nameInput').focus(), 100); }
  function showCard() { document.getElementById('registerScreen').classList.remove('active'); document.getElementById('cardScreen').classList.add('active'); renderCard(); }
  localStorage.getItem(NAME_KEY) ? showCard() : showRegister();

  /* ─── 名前入力 ─── */
  const nameInput = document.getElementById('nameInput');
  const startBtn  = document.getElementById('startBtn');
  nameInput.addEventListener('input', () => { startBtn.disabled = !nameInput.value.trim(); });
  nameInput.addEventListener('keydown', e => { if (e.key==='Enter' && !startBtn.disabled) registerName(); });
  startBtn.addEventListener('click', registerName);
  function registerName() { const n = nameInput.value.trim(); if (!n) return; localStorage.setItem(NAME_KEY, n); showCard(); }

  /* ─── リセット ─── */
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (!confirm('スタンプ記録と名前をすべて削除して最初からやり直しますか？')) return;
    [NAME_KEY, STAMP_KEY, UID_KEY].forEach(k => localStorage.removeItem(k));
    location.reload();
  });

  /* ─── ポップアップ ─── */
  const popup = document.getElementById('popupOverlay');
  document.getElementById('popupClose').addEventListener('click', () => popup.classList.remove('show'));
  popup.addEventListener('click', e => { if (e.target===popup) popup.classList.remove('show'); });
  document.getElementById('popupStampImg').src = STAMP_IMG_B64;
  function showPopup(dateLabel, isRescue) {
    document.getElementById('popupMsg').textContent  = isRescue ? '救済スタンプ、押しました！' : MESSAGES[Math.floor(Math.random()*MESSAGES.length)];
    document.getElementById('popupDate').textContent = dateLabel + ' のスタンプ';
    popup.classList.add('show');
  }

  /* ─── トースト ─── */
  let toastTimer;
  function showToast(msg) { clearTimeout(toastTimer); const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); toastTimer = setTimeout(() => el.classList.remove('show'), 2600); }

  /* ─── 日付ユーティリティ ─── */
  function getJST()  { return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Tokyo'})); }
  function toYMD(d)  { return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0'); }
  function toKey(d)  { return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
  function fmtShort(d){ return (d.getMonth()+1)+'/'+String(d.getDate()).padStart(2,'0'); }
  function fmtLong(d) { return (d.getMonth()+1)+'月'+d.getDate()+'日'; }
  const WD = ['日','月','火','水','木','金','土'];

  /* ─── スタンプデータ ─── */
  function loadStamps() { try { return JSON.parse(localStorage.getItem(STAMP_KEY)||'[]'); } catch(e) { return []; } }
  function saveStamps(s) { try { localStorage.setItem(STAMP_KEY, JSON.stringify(s)); } catch(e) {} }
  function stampedOnKey(stamps, key) { return stamps.some(s => { const d=new Date(s.date); const jd=new Date(d.toLocaleString('en-US',{timeZone:'Asia/Tokyo'})); return toKey(jd)===key; }); }
  function todayKey() { const n=getJST(); return toKey(n); }
  function stampedToday(stamps) { return stampedOnKey(stamps, todayKey()); }

  /* ─── Collectボタン ─── */
  function updateCollectBtn(stamps) {
    const btn=document.getElementById('collectBtn'), sub=document.getElementById('collectSub');
    btn.onclick = null;
    if (stampedToday(stamps)) {
      btn.className='collect-btn done'; btn.innerHTML='✿ Today\'s stamp collected!';
      sub.textContent='今日のスタンプは押し済みです'; return;
    }
    btn.className='collect-btn ready'; btn.innerHTML='✿ Collect today\'s stamp';
    sub.textContent = fmtLong(getJST())+' のスタンプを押す';
    btn.onclick = () => {
      const fresh=loadStamps();
      if (stampedToday(fresh)) { renderCard(); return; }
      fresh.push({ date: new Date().toISOString(), rescue: false });
      saveStamps(fresh);
      renderCard(fresh.length-1);
      showPopup(fmtLong(getJST()), false);
    };
  }

  /* ─── 救済モーダル ─── */
  const rescueModal   = document.getElementById('rescueModal');
  const rescueCodeEl  = document.getElementById('rescueCode');
  const rescueErrorEl = document.getElementById('rescueError');
  const rescueApplyBtn= document.getElementById('rescueApply');
  let selectedRescueDate = null;

  document.getElementById('rescueToggle').addEventListener('click', openRescueModal);
  document.getElementById('rescueCancel').addEventListener('click', closeRescueModal);
  rescueModal.addEventListener('click', e => { if (e.target===rescueModal) closeRescueModal(); });

  function openRescueModal() {
    rescueCodeEl.value = '';
    rescueErrorEl.textContent = '';
    rescueApplyBtn.disabled = true;
    selectedRescueDate = null;

    // 選べる日付を構築（今日含め過去RESCUE_DAYS日、すでに押した日は除く）
    const stamps = loadStamps();
    const now = getJST();
    const group = document.getElementById('dateRadioGroup');
    group.innerHTML = '';
    let availableCount = 0;

    for (let i = 0; i < RESCUE_DAYS; i++) {
      const d = new Date(now); d.setDate(now.getDate() - i);
      const key = toKey(d);
      if (stampedOnKey(stamps, key)) continue; // 押し済みはスキップ
      availableCount++;

      const label = document.createElement('label');
      label.className = 'date-radio-label';
      label.innerHTML = `
        <input type="radio" name="rescueDate" value="${key}" data-ymd="${toYMD(d)}" />
        <div>
          <div class="date-radio-main">${fmtLong(d)}（${WD[d.getDay()]}）${i===0?' — 今日':''}</div>
        </div>`;
      label.querySelector('input').addEventListener('change', function() {
        document.querySelectorAll('.date-radio-label').forEach(l=>l.classList.remove('selected'));
        label.classList.add('selected');
        selectedRescueDate = { key, ymd: toYMD(d), label: fmtLong(d) };
        validateRescue();
      });
      group.appendChild(label);
    }

    if (availableCount === 0) {
      group.innerHTML = '<p style="font-size:13px;color:var(--muted);padding:8px 0;">申請できる日付がありません（直近3日はすでにスタンプ済みです）</p>';
    }

    rescueCodeEl.addEventListener('input', validateRescue);
    rescueModal.classList.add('show');
    setTimeout(() => rescueCodeEl.focus(), 200);
  }

  function validateRescue() {
    rescueErrorEl.textContent = '';
    const code = rescueCodeEl.value.trim();
    rescueApplyBtn.disabled = !(code.length === 6 && selectedRescueDate);
  }

  function closeRescueModal() {
    rescueModal.classList.remove('show');
    rescueCodeEl.removeEventListener('input', validateRescue);
  }

  rescueApplyBtn.addEventListener('click', () => {
    if (!selectedRescueDate) return;
    const entered = rescueCodeEl.value.trim();
    const correct = generateCode(selectedRescueDate.ymd);
    if (entered !== correct) {
      rescueErrorEl.textContent = 'コードが正しくありません。運営に確認してください。';
      rescueCodeEl.focus();
      return;
    }
    // コードOK → スタンプ追加
    const fresh = loadStamps();
    if (stampedOnKey(fresh, selectedRescueDate.key)) {
      closeRescueModal();
      showToast('その日はすでにスタンプ済みです');
      return;
    }
    // 日付順に挿入（ISOStringで近似）
    fresh.push({ date: new Date(selectedRescueDate.key.replace(/-/g,'/')).toISOString(), rescue: true });
    fresh.sort((a,b) => new Date(a.date)-new Date(b.date));
    saveStamps(fresh);
    closeRescueModal();
    renderCard(fresh.length-1);
    showPopup(selectedRescueDate.label, true);
  });

  /* ─── カード描画 ─── */
  function totalCells(count) { return Math.max(1, Math.ceil(Math.max(count,1)/CELLS_PER_PAGE))*CELLS_PER_PAGE; }

  function renderCard(newIdx) {
    const name=localStorage.getItem(NAME_KEY)||'', stamps=loadStamps(), count=stamps.length;
    document.getElementById('heroName').innerHTML = name+'<span> さんのカード</span>';
    document.getElementById('heroSub').textContent = 'スタンプ '+count+' / '+totalCells(count);

    const TOTAL=totalCells(count);
    document.getElementById('sCount').textContent  = count;
    document.getElementById('sTotal').textContent  = TOTAL;
    document.getElementById('sRemain').textContent = TOTAL-count;
    const pct=Math.round((count/TOTAL)*100);
    document.getElementById('pPct').textContent  = pct+'%';
    document.getElementById('pFrac').textContent = count+' / '+TOTAL;
    document.getElementById('pBar').style.width  = pct+'%';
    if (count>0 && count===TOTAL) document.getElementById('completeBanner').classList.add('show');

    updateCollectBtn(stamps);

    const area=document.getElementById('cardArea'); area.innerHTML='';
    const pages=TOTAL/CELLS_PER_PAGE;
    for (let p=0;p<pages;p++){
      const frame=document.createElement('div'); frame.className='card-frame';
      const hdr=document.createElement('div'); hdr.className='card-header';
      const ttl=document.createElement('div'); ttl.className='card-title';
      ttl.textContent=pages>1?'スタンプカード '+(p+1)+'枚目':'スタンプカード';
      const start=p*CELLS_PER_PAGE, end=(p+1)*CELLS_PER_PAGE;
      const pageCnt=Math.max(0,Math.min(count,end)-start);
      const cntEl=document.createElement('div'); cntEl.className='card-count';
      cntEl.textContent=pageCnt+' / '+CELLS_PER_PAGE+' マス';
      hdr.appendChild(ttl); hdr.appendChild(cntEl); frame.appendChild(hdr);

      const grid=document.createElement('div'); grid.className='stamp-grid';
      for (let i=start;i<end;i++){
        const isStamped=i<count;
        const isRescue=isStamped && stamps[i].rescue===true;
        const cell=document.createElement('div');
        cell.className='cell '+(isStamped?(isRescue?'rescue-stamped':'stamped'):'empty');
        if(i===newIdx) cell.classList.add('stamp-anim');

        const numEl=document.createElement('div'); numEl.className='cell-num'; numEl.textContent=i+1; cell.appendChild(numEl);

        const imgWrap=document.createElement('div'); imgWrap.className='cell-img';
        const img=document.createElement('img'); img.src=STAMP_IMG_B64; img.alt='stamp';
        imgWrap.appendChild(img); cell.appendChild(imgWrap);

        const dateEl=document.createElement('div'); dateEl.className='cell-date';
        if(isStamped){
          const d=new Date(stamps[i].date), jd=new Date(d.toLocaleString('en-US',{timeZone:'Asia/Tokyo'}));
          dateEl.textContent=fmtShort(jd)+(isRescue?'\n(救済)':'');
        }
        cell.appendChild(dateEl);
        grid.appendChild(cell);
      }
      frame.appendChild(grid); area.appendChild(frame);
    }
  }

  renderCard();

  /* ─── 管理者コード確認（コンソールから） ─── */
  // ブラウザの開発者コンソールで adminCodes() を実行すると直近3日のコードが確認できます
  window.adminCodes = function() {
    const now=getJST();
    console.log('=== 救済コード一覧 ===');
    for(let i=0;i<7;i++){
      const d=new Date(now); d.setDate(now.getDate()-i);
      console.log(fmtLong(d)+'（'+WD[d.getDay()]+'）: '+generateCode(toYMD(d)));
    }
  };
})();
</script>
</body>
</html>
